services:
  context7-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jarvis-context7-mcp
    restart: unless-stopped
    ports:
      - "8932:8080"
    environment:
      - NODE_ENV=production
      - CONTEXT7_API_KEY=${CONTEXT7_API_KEY:-}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
